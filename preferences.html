<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuTrack — Preferences</title>
<link rel="stylesheet" href="main.css">
<script src="db.js"></script>
<script>
  if (!DMT.isLoggedIn()) { window.location.replace("login.html"); }
</script>
<style>
  .settings-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; align-items: start; }
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 { font-size: 14px; font-weight: 700; color: var(--red); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
  .form-group { flex: 1; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-group label { font-size: 11.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-family: var(--font); font-size: 13.5px; background: var(--white); color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--red); }
  .form-group input[disabled] { background: var(--gray-bg); color: var(--muted); cursor: not-allowed; border-color: transparent; font-family: monospace; font-weight: 600; }
  
  .toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .toggle-wrap:last-child { border-bottom: none; }
  .toggle-label { font-size: 13.5px; font-weight: 600; color: var(--text); }
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--red); }
  input:checked + .slider:before { transform: translateX(20px); }

</style>
</head>
<body>
<div class="layout">
  <div class="mobile-overlay" id="mobileOverlay"></div>
  
  <aside class="sidebar">
    <div class="sidebar-profile">
      <div class="avatar-circle"></div>
      <p class="profile-name">—</p>
    </div>
    <nav class="sidebar-nav">
      <div style="font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.4); padding: 12px 22px 6px; letter-spacing: 0.5px;">WORKSPACE</div>
      <a href="index.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard</a>
      <a href="documents.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> My Documents</a>

      <div style="font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.4); padding: 20px 22px 6px; letter-spacing: 0.5px;">ACCOUNT</div>
      <a href="notifications.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Notifications</a>
      <a href="preferences.html" class="nav-item active"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Preferences</a>
    </nav>
    <a href="#" class="signout">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </a>
  </aside>

  <main class="main-content">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div style="display: flex; align-items: center;">
        <button id="menuToggle" class="menu-toggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 class="page-title">PREFERENCES</h1>
          <p class="page-sub">Manage your profile and settings.</p>
        </div>
      </div>
      <button class="btn-blue" onclick="savePreferences()">Save Changes</button>
    </div>

    <div class="settings-grid">
      <div class="card">
        <div class="settings-section">
          <h3>Profile Information</h3>
          <div class="form-row">
            <div class="form-group"><label>First Name</label><input type="text" id="prefFirstName"></div>
            <div class="form-group"><label>Last Name</label><input type="text" id="prefLastName"></div>
          </div>
          <div class="form-group"><label>Contact Number</label><input type="text" id="prefPhone" placeholder="+63 900 000 0000"></div>
          <div class="form-group"><label>Email Address</label><input type="email" id="prefEmail" disabled></div>
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom: 24px;">
          <div class="settings-section" style="margin-bottom: 0;">
            <h3>App Settings</h3>
            <div class="toggle-wrap">
              <span class="toggle-label">Push Notifications</span>
              <label class="switch"><input type="checkbox" id="toggleNotifs" checked onchange="applyPushNotifs()"><span class="slider"></span></label>
            </div>
            <div class="toggle-wrap">
              <span class="toggle-label">Dark Mode</span>
              <label class="switch"><input type="checkbox" id="toggleTheme" onchange="applyTheme()"><span class="slider"></span></label>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="settings-section" style="margin-bottom: 0;">
            <h3>Account Status</h3>
            <div class="form-group"><label>System Role</label><input type="text" value="Standard User" disabled></div>
            <div class="form-group"><label>Account Created</label><input type="text" id="prefJoined" disabled></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="profile.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var user = DMT.getCurrentUser();

    document.getElementById('prefFirstName').value = user.firstName;
    document.getElementById('prefLastName').value = user.lastName;
    document.getElementById('prefEmail').value = user.email;
    document.getElementById('prefPhone').value = user.phone || '';

    var joinDate = new Date(user.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('prefJoined').value = joinDate;

    var isDark = localStorage.getItem('dmt_theme') === 'dark';
    document.getElementById('toggleTheme').checked = isDark;

    var pushNotifs = localStorage.getItem('dmt_pushNotifs');
    document.getElementById('toggleNotifs').checked = (pushNotifs !== 'false');

    window.hasUnsavedChanges = false;
    var formInputs = [
      document.getElementById('prefFirstName'),
      document.getElementById('prefLastName'),
      document.getElementById('prefPhone')
    ];
    
    formInputs.forEach(function(input) {
      input.addEventListener('input', function() {
        window.hasUnsavedChanges = true;
      });
    });

    document.querySelectorAll('a.nav-item').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.hasUnsavedChanges && !this.classList.contains('active')) {
          e.preventDefault();
          var targetHref = this.href;
          DMT.ui._createModal('Unsaved Changes', 'You have unsaved changes to your profile. Do you want to save them before leaving?', [
            { text: 'Cancel', class: 'btn-outline' },
            { text: 'Discard', class: 'btn-outline btn-danger-hover', callback: function() { window.hasUnsavedChanges = false; window.location.href = targetHref; } },
            { text: 'Save & Leave', class: 'btn-blue', callback: function() { savePreferences(); window.hasUnsavedChanges = false; window.location.href = targetHref; } }
          ]);
        }
      });
    });

    window.addEventListener('beforeunload', function(e) {
      if (window.hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  });

  function savePreferences() {
  var user = DMT.getCurrentUser();
  var users = JSON.parse(localStorage.getItem('dmt_users'));
  var idx = users.findIndex(u => u.id === user.id);

  users[idx].firstName = document.getElementById('prefFirstName').value.trim();
  users[idx].lastName = document.getElementById('prefLastName').value.trim();
  users[idx].phone = document.getElementById('prefPhone').value.trim();

  localStorage.setItem('dmt_users', JSON.stringify(users));

  var pushEnabled = document.getElementById('toggleNotifs').checked;
  localStorage.setItem('dmt_pushNotifs', pushEnabled ? 'true' : 'false');

  DMT.ui.alert("Your preferences have been successfully saved.", "Profile Updated");
  
  window.hasUnsavedChanges = false;

  updateSidebarUI(users[idx]);
}

function applyTheme() {
  var isDark = document.getElementById('toggleTheme').checked;
  document.body.classList.toggle('dark-mode', isDark);
  localStorage.setItem('dmt_theme', isDark ? 'dark' : 'light');
}
</script>
</body>
</html>
