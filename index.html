<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuTrack — My Dashboard</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="dashboard.css">
<script src="db.js"></script>
<script>
  if (!DMT.isLoggedIn()) { window.location.replace("login.html"); }
</script>
</head>
<body>
<div class="layout">
  <div class="mobile-overlay" id="mobileOverlay"></div>
  
  <aside class="sidebar">
    <div class="sidebar-profile">
      <div class="avatar-circle"></div>
      <p class="profile-name">—</p>
    </div>
    <nav class="sidebar-nav">
      <div style="font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.4); padding: 12px 22px 6px; letter-spacing: 0.5px;">WORKSPACE</div>
      <a href="index.html" class="nav-item active">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="documents.html" class="nav-item">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        My Documents
      </a>

      <div style="font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.4); padding: 20px 22px 6px; letter-spacing: 0.5px;">ACCOUNT</div>
      <a href="notifications.html" class="nav-item">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Notifications
      </a>
      <a href="preferences.html" class="nav-item">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Preferences
      </a>
    </nav>
    <a href="#" class="signout">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div style="display: flex; align-items: center;">
        <button id="menuToggle" class="menu-toggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 class="page-title">MY DASHBOARD</h1>
          <p class="page-sub">Welcome back. Here is your personal document summary.</p>
        </div>
      </div>
    </div>

    <div class="stats-row" style="grid-template-columns: repeat(3, 1fr);">
      <div class="stat-card" style="background: var(--blue);">
        <div class="stat-label">TOTAL UPLOADS</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card" style="background: var(--amber);">
        <div class="stat-label">AWAITING APPROVAL</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
      <div class="stat-card" style="background: var(--green);">
        <div class="stat-label">APPROVED</div>
        <div class="stat-value" id="statApproved">0</div>
      </div>
    </div>

    <div class="dash-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
      
      <div class="card">
        <div class="dash-card-head" style="margin-bottom: 16px;">
          <h2 style="font-size:15px; font-weight:700; color: var(--text);">My Recent Documents</h2>
          <a href="documents.html" class="view-all-link">View all</a>
        </div>
        <table style="width: 100%; border-collapse: collapse;">
          <tbody id="recentDocsList">
            </tbody>
        </table>
      </div>

      <div class="card">
        <h2 style="font-size:15px; font-weight:700; color: var(--text); margin-bottom: 18px;">Account Status</h2>
        
        <div style="margin-bottom: 16px;">
          <label style="font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;">System Role</label>
          <div style="font-size: 14px; font-weight: 600; color: var(--text); padding: 6px 0;">Standard User</div>
        </div>
        
        <div>
          <label style="font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;">Member Since</label>
          <div id="joinDate" class="mono" style="font-size: 13px; font-weight: 600; padding: 6px 0;">—</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="profile.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var user = DMT.getCurrentUser();
    if (!user) return;

    if (localStorage.getItem('dmt_theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }

    var myDocs = DMT.getUserDocs(user.id);
    
    document.getElementById('statTotal').textContent = myDocs.length;
    document.getElementById('statPending').textContent = myDocs.filter(function(d) { return d.status === 'Pending Approval' || d.status === 'In Transit'; }).length;
    document.getElementById('statApproved').textContent = myDocs.filter(function(d) { return d.status === 'Approved'; }).length;

    var joinDateStr = new Date(user.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('joinDate').textContent = joinDateStr;

    var tbody = document.getElementById('recentDocsList');
    if (myDocs.length === 0) {
      tbody.innerHTML = '<tr><td style="text-align:center; padding: 30px; color: var(--muted); font-size: 13px;">No documents uploaded yet.</td></tr>';
    } else {
      var sortedDocs = myDocs.sort(function(a, b) { return b.createdAt - a.createdAt; }).slice(0, 5);
      
      tbody.innerHTML = sortedDocs.map(function(d) {
        var badgeBg = '#f3f4f6', badgeCol = '#374151';
        if (d.status === 'Approved') { badgeBg = '#dcfce7'; badgeCol = '#15803d'; }
        if (d.status === 'Pending Approval' || d.status === 'In Transit') { badgeBg = '#fef3c7'; badgeCol = '#b45309'; }
        if (d.status === 'Rejected') { badgeBg = '#fee2e2'; badgeCol = '#dc2626'; }

        return `
          <tr style="border-bottom: 1px solid var(--border);">
            <td class="mono" style="padding: 12px 4px; width: 80px;">${d.id}</td>
            <td style="padding: 12px 8px; font-weight: 600; color: var(--text);">${d.name}</td>
            <td style="padding: 12px 4px; text-align: right;">
              <span style="font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 4px; background: ${badgeBg}; color: ${badgeCol};">${d.status}</span>
            </td>
          </tr>
        `;
      }).join('');
    }
  });
</script>
</body>
</html>
