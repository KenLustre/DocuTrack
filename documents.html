</head>

        Dashboard
      </a>
      <a href="documents.html" class="nav-item active">

        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

      Sign Out
    </a>
  </aside>

  <main class="main-content">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div style="display: flex; align-items: center;">
        <button id="menuToggle" class="menu-toggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 class="page-title">MY DOCUMENTS</h1>
          <p class="page-sub" id="docCountLabel">Loading...</p>
        </div>
      </div>
      <button class="btn-blue" onclick="document.getElementById('uploadModal').classList.add('open')">Upload New Document</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr><th>ID</th><th>Title</th><th>Type</th><th>Date</th><th>Status</th></tr>
        </thead>
        <tbody id="userDocsTable"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-head"><h3>Submit New Document</h3></div>
    <div class="modal-body">
      <div class="form-group">
        <label>Document Title <span style="color:#dc2626">*</span></label>
        <input type="text" id="docTitle" placeholder="Enter title...">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="docType">
          <option>Form</option><option>Letter</option><option>Report</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-outline" onclick="document.getElementById('uploadModal').classList.remove('open')">Cancel</button>
      <button class="btn-blue" id="submitBtn">Submit to Routing</button>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script src="profile.js"></script> <script>
  function renderMyDocs() {
    var user = DMT.getCurrentUser();
    var myDocs = DMT.getUserDocs(user.id);
    var tbody = document.getElementById('userDocsTable');
    
    document.getElementById('docCountLabel').textContent = `Total: ${myDocs.length} documents`;

    tbody.innerHTML = myDocs.length ? myDocs.map(d => `
      <tr>
        <td class="mono">${d.id}</td>
        <td style="font-weight:600;">${d.name}</td>
        <td>${d.type}</td>
        <td>${d.date}</td>
        <td><span class="badge badge-pending">${d.status}</span></td>
      </tr>
    `).join('') : '<tr><td colspan="5" class="empty-state">No documents found.</td></tr>';
  }
  document.getElementById('submitBtn').onclick = function() {
    var titleInput = document.getElementById('docTitle');
    var user = DMT.getCurrentUser();

    if (!titleInput.value.trim()) {
      DMT.ui.alert("Document Title is required.", "Missing Information");
      titleInput.focus();
      return;
    }

    DMT.addDoc({ title: titleInput.value.trim(), type: document.getElementById('docType').value }, user);
    document.getElementById('uploadModal').classList.remove('open');
    titleInput.value = '';
    renderMyDocs();
  };

  document.addEventListener('DOMContentLoaded', renderMyDocs);
</script>
</body>
</html>
